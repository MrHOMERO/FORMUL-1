<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>F1 Sensation</title>
</head>
<body>

    <div id="pantalla-1" class="pantalla activa">
        <div class="animacion-entrada" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <h1 class="titulo-f1">F1</h1>
            <h2 class="titulo-sensation">SENSATION</h2>
            <div class="subtitulo-cursiva" style="margin: 15px 0;">Juego de simulador</div>
            <button class="btn-comenzar" onclick="reproducirMotorYCambiar()">COMENZAR JUEGO</button>
        </div>
    </div>

    <div id="pantalla-2" class="pantalla">
        <h3>Elige tu equipo</h3>
        <button class="btn-escuderia" onclick="seleccionarEquipo('McLaren')">McLaren</button>
        <button class="btn-escuderia" onclick="seleccionarEquipo('Ferrari')">Ferrari</button>
        <button class="btn-comenzar" onclick="cambiarPantalla('pantalla-2', 'pantalla-3')">Siguiente</button>
    </div>

    <div id="pantalla-3" class="pantalla">
        <h3>Presupuesto</h3>
        <button class="btn-escuderia" onclick="seleccionarPresupuesto(100)">100M - Privado</button>
        <button class="btn-escuderia" onclick="seleccionarPresupuesto(500)">500M - Oficial</button>
        <button class="btn-comenzar" onclick="cambiarPantalla('pantalla-3', 'pantalla-taller')">Ir al Taller</button>
    </div>

    <div id="pantalla-taller" class="pantalla">
        <h3 id="nombre-equipo-display">EQUIPO</h3>
        <p>GOMA ESTRATEGIA:</p>
        <div style="display: flex; gap: 5px; width: 90%; justify-content: center;">
            <button class="btn-escuderia" style="width: 30%;" onclick="seleccionarEstrategia('Blando')">Blando</button>
            <button class="btn-escuderia" style="width: 30%;" onclick="seleccionarEstrategia('Medio')">Medio</button>
            <button class="btn-escuderia" style="width: 30%;" onclick="seleccionarEstrategia('Duro')">Duro</button>
        </div>
        <button class="btn-simular" onclick="comenzarSimulacion()">INICIAR CARRERA</button>
    </div>

    <div id="pantalla-simulacion" class="pantalla">
        <div class="cockpit-pantalla">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <div id="sim-vueltas">Vuelta: 1/53</div>
                <div id="sim-posicion">P11</div>
            </div>
            <div id="auto-telemetria" style="display: flex; justify-content: space-around; padding: 15px;">
                <div class="rueda" style="width: 25px; height: 25px; border-radius: 50%; background: #00ff66;"></div>
                <div class="rueda" style="width: 25px; height: 25px; border-radius: 50%; background: #00ff66;"></div>
            </div>
            <div id="sim-velocidad" style="font-size: 24px; font-weight: bold; color: #00ff66; text-align: center;">267 km/h</div>
            <div class="panel-grid">
                <div class="telemetria-card">Motor<br><strong id="stat-motor">100%</strong></div>
                <div class="telemetria-card">Gomas<br><strong id="stat-gomas">100%</strong></div>
            </div>
        </div>
        <button class="btn-simular" style="background: #ffcc00; width: 90%;" onclick="ejecutarPitStop()">BOX BOX</button>
    </div>

    <audio id="sonido-motor" src="motor.mp3"></audio>

    <script src="script.js"></script>
    <script>
        function reproducirMotorYCambiar() {
            document.getElementById('sonido-motor').play().catch(e => console.log("Audio bloqueado"));
            cambiarPantalla('pantalla-1', 'pantalla-2');
        }
    </script>
</body>
</html>
