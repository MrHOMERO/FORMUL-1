<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <title>F1 Sensation 2026</title>
</head>
<body>

    <div id="pantalla-1" class="pantalla activa">
        <div class="animacion-entrada" style="text-align: center;">
            <h1 class="titulo-f1">F1</h1>
            <h2 class="titulo-sensation">SENSATION</h2>
            <input type="text" id="input-nombre" placeholder="Nombre del Director" class="btn-escuderia" style="background:white; color:black; margin-bottom:15px;">
            <button class="btn-comenzar" onclick="iniciarConNombre()">COMENZAR JUEGO</button>
        </div>
    </div>

    <div id="pantalla-2" class="pantalla">
        <div class="director-header" id="display-director">Director: -</div>
        <h2 style="margin-top:60px;">Elige tu equipo</h2>
        <div class="grid-equipos">
            <button class="btn-escuderia" onclick="seleccionarEquipo('Mercedes')">Mercedes</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Ferrari')">Ferrari</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('McLaren')">McLaren</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Red Bull Racing')">Red Bull</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Aston Martin')">Aston Martin</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Alpine')">Alpine</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Williams')">Williams</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Racing Bulls')">Racing Bulls</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Haas')">Haas</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Audi')">Audi</button>
            <button class="btn-escuderia" onclick="seleccionarEquipo('Cadillac')">Cadillac</button>
        </div>
    </div>

    <div id="pantalla-pilotos" class="pantalla">
        <h2 id="equipo-titulo" style="margin-bottom:20px;">Equipo</h2>
        <div id="lista-pilotos" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
    </div>

    <audio id="sonido-motor" src="motor.mp3"></audio>
    <script src="script.js"></script>
</body>
</html>
