<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation - Dirección de Equipo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portada">
        
        <div id="pantalla-taller" class="pantalla activa">
            <div class="titulo-pantalla">Taller de Ingeniería</div>
            <div class="contenedor-auto">
                <div class="f1-logo-badge" id="logo-equipo-taller">MCLAREN</div>
                <div id="piloto-asignado-auto" style="font-weight: bold; margin-bottom: 10px;">Piloto: -</div>
            </div>

            <div id="selector-estrategia" style="margin: 20px 0; text-align: left;">
                <p style="font-size: 12px; color: #aaa;">ESTRATEGIA DE NEUMÁTICOS:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Blando')">Blando<span>+Velocidad</span></button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Medio')">Medio<span>Eq.</span></button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Duro')">Duro<span>-Desgaste</span></button>
                </div>
            </div>

            <button class="btn-simular" onclick="comenzarSimulacion()">Iniciar Carrera</button>
        </div>

        <div id="pantalla-simulacion" class="pantalla">
            <div class="titulo-pantalla">Telemetría de Mando</div>
            
            <div class="cockpit-pantalla">
                <div id="sim-vueltas" style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">Vuelta: 1/53</div>
                
                <div class="panel-grid" style="margin-bottom: 15px;">
                    <div class="telemetria-card"><span>Motor</span><strong id="stat-motor">100%</strong></div>
                    <div class="telemetria-card"><span>Gomas</span><strong id="stat-gomas">100%</strong></div>
                </div>

                <div style="font-size: 28px; font-weight: bold; color: #00ff66; margin-bottom: 15px;" id="sim-velocidad">280 km/h</div>
            </div>

            <button class="btn-simular" style="background: #ffcc00; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;" onclick="ejecutarPitStop()">ENTRAR A PITS (BOX BOX)</button>
            <button class="btn-comenzar" style="background: #333; margin-top: 10px;" onclick="location.reload()">Reiniciar Sesión</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
