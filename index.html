<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation - Dirección de Equipo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portada">
        
        <div id="pantalla-taller" class="pantalla activa">
            <div class="titulo-pantalla">Taller de Ingeniería</div>
            <div class="contenedor-auto">
                <div class="f1-logo-badge" id="logo-equipo-taller">MCLAREN</div>
                <div id="piloto-asignado-auto" style="font-weight: bold; margin-bottom: 10px;">Piloto: -</div>
            </div>

            <div id="selector-estrategia" style="margin: 20px 0; text-align: left;">
                <p style="font-size: 12px; color: #aaa;">SELECCIONA TIPO DE GOMA:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Blando')">Blando<span>+Velocidad</span></button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Medio')">Medio<span>Equilibrado</span></button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Duro')">Duro<span>-Desgaste</span></button>
                </div>
            </div>

            <button class="btn-simular" onclick="comenzarSimulacion()">Iniciar Carrera</button>
        </div>

        <div id="pantalla-simulacion" class="pantalla">
            
            <div class="cockpit-pantalla">
                <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                    <div id="sim-vueltas" style="font-size: 16px; font-weight: bold;">Vuelta: 1/53</div>
                    <div style="text-align: right;">
                        <span style="font-size: 9px; color: #aaa; display: block;">POSICIÓN</span>
                        <div id="sim-posicion" style="font-size: 18px; font-weight: bold;">P11</div>
                    </div>
                </div>

                <div id="auto-telemetria" style="width: 100%; height: 70px; background: rgba(0,0,0,0.5); margin: 15px 0; border-radius: 8px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #444;">
                    <div class="rueda" id="rueda-fl" style="width: 18px; height: 18px; border-radius: 50%; background: #00ff66; box-shadow: 0 0 10px #00ff66;"></div>
                    <div class="rueda" id="rueda-fr" style="width: 18px; height: 18px; border-radius: 50%; background: #00ff66; box-shadow: 0 0 10px #00ff66;"></div>
                </div>

                <div id="sim-velocidad" style="font-size: 26px; font-weight: bold; color: #00ff66; margin-bottom: 10px;">267 km/h</div>
                
                <div class="panel-grid">
                    <div class="telemetria-card"><span>Motor</span><strong id="stat-motor">100%</strong></div>
                    <div class="telemetria-card"><span>Gomas</span><strong id="stat-gomas">100%</strong></div>
                </div>
            </div>

            <button class="btn-simular" style="background: #ffcc00; color: #000; margin-top: 15px;" onclick="ejecutarPitStop()">ENTRAR A PITS (BOX BOX)</button>
            <button class="btn-comenzar" style="background: #333; margin-top: 10px;" onclick="location.reload()">Reiniciar Sesión</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
