<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Manager 2026 3D</title>
    <!-- Cargamos el motor 3D de Three.js desde un servidor seguro -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0f0f14;
            --panel-bg: #1a1a24;
            --text-light: #ffffff;
            --text-muted: #88889c;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .pantalla { display: none; max-width: 100%; padding: 15px; box-sizing: border-box; }
        .activa { display: block; }

        /* CONTENEDOR PARA EL LIENZO 3D REGLAMENTARIO */
        #canvas-3d-contenedor {
            width: 100%;
            height: 45vh;
            background-color: #050508;
            position: relative;
        }

        .interfaz-inicio {
            text-align: center;
            padding: 20px 15px;
        }

        .btn-grande {
            background-color: var(--f1-red);
            font-size: 18px;
            padding: 15px 30px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(225, 6, 0, 0.4);
            width: 90%;
            max-width: 300px;
        }

        .btn-verde {
            background-color: #4caf50;
            font-size: 16px;
            padding: 12px 25px;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .grid-equipos, .grid-pilotos {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .tarjeta-seleccion {
            background-color: var(--panel-bg);
            border: 2px solid #2d2d3d;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .upgrade-card {
            background: #252533;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .opciones-piezas {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-pieza {
            background: #333344;
            color: white;
            border: 1px solid #444455;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            text-align: left;
        }

        .consola {
            background: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 12px;
            height: 100px;
            overflow-y: auto;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <!-- PANTALLA 1: BIENVENIDA 3D -->
    <div id="p-inicio" class="pantalla activa" style="padding:0;">
        <!-- Aquí se dibuja el auto en tiempo real -->
        <div id="canvas-3d-contenedor"></div> 
        
        <div class="interfaz-inicio">
            <h1 style="font-size: 32px; margin: 10px 0 5px 0; letter-spacing: 1px;">F1 MANAGER 3D</h1>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">Inspecciona el monoplaza prototipo 2026 en el laboratorio virtual.</p>
            <button class="btn-grande" onclick="iniciarJuego()">ENTRAR AL GARAJE</button>
        </div>
    </div>

    <!-- PANTALLA 2: ELEGIR EQUIPO -->
    <div id="p-equipo" class="pantalla">
        <h2>Paso 1: Selecciona tu escudería</h2>
        <div class="grid-equipos" id="contenedor-equipos"></div>
    </div>

    <!-- PANTALLA 3: ELEGIR PILOTO -->
    <div id="p-piloto" class="pantarma">
        <h2>Paso 2: Elige tu piloto</h2>
        <div class="grid-pilotos" id="contenedor-pilotos"></div>
    </div>

    <!-- PANTALLA 4: EL TALLER -->
    <div id="p-taller" class="pantalla">
        <div style="border-bottom: 4px solid var(--f1-red); padding-bottom: 10px; margin-bottom: 20px;">
            <h1 id="txt-taller-equipo" style="font-size: 24px; margin:0;">ESCUDERÍA</h1>
            <span id="txt-taller-rol" style="color: var(--text-muted); font-size: 13px;">Ingeniero de Carrera</span>
            <div style="background: #111; padding: 10px; border-radius: 6px; margin-top:10px;">
                <div style="font-size: 11px; color: var(--text-muted);">PRESUPUESTO RESTANTE</div>
                <div id="txt-taller-dinero" style="font-size: 24px; color: #4caf50; font-weight: bold;">$215,000,000</div>
            </div>
        </div>

        <div class="upgrade-card">
            <strong style="color: var(--f1-red);">Alerón Delantero 3D</strong>
            <div class="opciones-piezas">
                <button class="btn-pieza" id="btn-aero-1" onclick="comprarPieza('aero', 'Alerón de Alta Carga', 15000000, 'btn-aero-1', 0xff0000)">🔴 Cambiar a Alerón de Alta Carga — $15M</button>
                <button class="btn-pieza" id="btn-aero-2" onclick="comprarPieza('aero', 'Alerón de Perfil Bajo', 25000000, 'btn-aero-2', 0x00ffcc)">🟢 Cambiar a Alerón de Perfil Bajo — $25M</button>
            </div>
        </div>

        <div class="consola" id="consola-taller">[SISTEMA]: Simulación de chasis cargada.</div>
        <button class="btn-verde" onclick="alert('¡Estrategia y telemetría 3D listas en el muro de boxes!')">AVANZAR AL CIRCUITO 🏁</button>
    </div>

    <!-- SCRIPT DEL MOTOR 3D Y LÓGICA -->
    <script>
        // --- MOTOR THREE.JS (GARAJE 3D) ---
        let escena, camara, renderizador, monoplaza, alerónDelantero;

        function init3D() {
            const contenedor = document.getElementById('canvas-3d-contenedor');
            
            // 1. Crear Escena
            escena = new THREE.Scene();
            escena.background = new THREE.Color(0x0a0a0f);

            // 2. Crear Cámara
            camara = new THREE.PerspectiveCamera(60, contenedor.clientWidth / contenedor.clientHeight, 0.1, 1000);
            camara.position.set(0, 2.5, 6);
            camara.lookAt(0, 0, 0);

            // 3. Renderizador
            renderizador = new THREE.WebGLRenderer({ antialias: true });
            renderizador.setSize(contenedor.clientWidth, contenedor.clientHeight);
            contenedor.appendChild(renderizador.domElement);

            // 4. Luces de Escudería
            const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.6);
            escena.add(luzAmbiental);

            const luzDirecional = new THREE.DirectionalLight(0xffffff, 1.2);
            luzDirecional.position.set(5, 10, 7);
            escena.add(luzDirecional);

            // 5. CONSTRUCCIÓN DEL MONOPLAZA CON PIEZAS 3D
            monoplaza = new THREE.Group();

            // Chasis principal (Cuerpo del auto)
            const geoChasis = new THREE.BoxGeometry(1.2, 0.5, 3.5);
            const matChasis = new THREE.MeshStandardMaterial({ color: 0x1e1e24, roughness: 0.2, metalness: 0.8 });
            const cuerpoAuto = new THREE.Mesh(geoChasis, matChasis);
            monoplaza.add(cuerpoAuto);

            // Cabina del piloto
            const geoCabina = new THREE.ConeGeometry(0.4, 1, 4);
            geoCabina.rotateX(Math.PI / 2);
            const matCabina = new THREE.MeshStandardMaterial({ color: 0x111111 });
            const cabina = new THREE.Mesh(geoCabina, matCabina);
            cabina.position.set(0, 0.3, 0.2);
            monoplaza.add(cabina);

            // Alerón Delantero Prototipo
            const geoAleron = new THREE.BoxGeometry(2.4, 0.1, 0.4);
            const matAleron = new THREE.MeshStandardMaterial({ color: 0xe10600, roughness: 0.5 });
            alerónDelantero = new THREE.Mesh(geoAleron, matAleron);
            alerónDelantero.position.set(0, -0.1, 1.8);
            monoplaza.add(alerónDelantero);

            // Alerón Trasero DRS
            const geoAleronTrasero = new THREE.BoxGeometry(1.6, 0.4, 0.3);
            const aleronTrasero = new THREE.Mesh(geoAleronTrasero, matAleron);
            aleronTrasero.position.set(0, 0.5, -1.6);
            monoplaza.add(aleronTrasero);

            // Neumáticos Pirelli Tridimensionales
            const geoNeumatico = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 24);
            geoNeumatico.rotateZ(Math.PI / 2);
            const matNeumatico = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.9 });

            const posicionesLlantas = [
                [-0.8, -0.1, 1.2],  // Delantera Izquierda
                [0.8, -0.1, 1.2],   // Delantera Derecha
                [-0.8, -0.1, -1.2], // Trasera Izquierda
                [0.8, -0.1, -1.2]   // Trasera Derecha
            ];

            posicionesLlantas.forEach(pos => {
                const llanta = new THREE.Mesh(geoNeumatico, matNeumatico);
                llanta.position.set(pos[0], pos[1], pos[2]);
                monoplaza.add(llanta);
            });

            escena.add(monoplaza);

            // Piso reflejante de Pits
            const geoPiso = new THREE.PlaneGeometry(20, 20);
            const matPiso = new THREE.MeshStandardMaterial({ color: 0x08080c, roughness: 0.4 });
            const piso = new THREE.Mesh(geoPiso, matPiso);
            piso.rotation.x = -Math.PI / 2;
            piso.position.y = -0.55;
            escena.add(piso);

            // Iniciar bucle de animación
            animar();
        }

        function animar() {
            requestAnimationFrame(animar);
            // El monoplaza rota suavemente en el showroom para poder apreciarlo en 3D
            if(monoplaza) monoplaza.rotation.y += 0.01;
            renderizador.render(escena, camara);
        }

        // Ejecutar inicialización 3D al cargar la web
        window.onload = init3D;


        // --- LÓGICA DE JUEGO ADAPTADA ---
        const EQUIPOS_F1 = {
            "Red Bull Racing": { color: "#0c1f3c" },
            "Ferrari": { color: "#e10600" },
            "Mercedes": { color: "#00a19c" },
            "McLaren": { color: "#ff8700" }
        };

        let miPartida = {
            presupuestoDesarrollo: 215000000
        };

        function cambiarPantalla(idOcultar, idMostrar) {
            document.getElementById(idOcultar).style.display = 'none';
            document.getElementById(idMostrar).style.display = 'block';
        }

        function iniciarJuego() {
            const contenedor = document.getElementById('contenedor-equipos');
            contenedor.innerHTML = "";
            Object.keys(EQUIPOS_F1).forEach(key => {
                contenedor.innerHTML += `
                    <div class="tarjeta-seleccion" style="border-left: 6px solid ${EQUIPOS_F1[key].color}; text-align: left;" onclick="clickEquipo('${key}')">
                        <strong>${key}</strong>
                    </div>
                `;
            });
            cambiarPantalla('p-inicio', 'p-equipo');
        }

        function clickEquipo(nombreEquipo) {
            const contenedorPilotos = document.getElementById('contenedor-pilotos');
            contenedorPilotos.innerHTML = `
                <div class="tarjeta-seleccion" onclick="clickPiloto('Piloto Estrella')">
                    <strong>Piloto Titular A (${nombreEquipo})</strong>
                </div>
            `;
            cambiarPantalla('p-equipo', 'p-piloto');
        }

        function clickPiloto(nombrePiloto) {
            cambiarPantalla('p-piloto', 'p-taller');
        }

        // INTERACCIÓN DINÁMICA: Cambiar colores de la pieza 3D en vivo
        function comprarPieza(categoria, nombrePieza, costo, botonId, colorHex) {
            if (miPartida.presupuestoDesarrollo - costo >= 0) {
                miPartida.presupuestoDesarrollo -= costo;
                document.getElementById('txt-taller-dinero').innerText = '$' + miPartida.presupuestoDesarrollo.toLocaleString();
                
                // ¡CAMBIAMOS EL COLOR DEL ALERÓN EN TIEMPO REAL EN EL MOTOR 3D!
                if(alerónDelantero) {
                    alerónDelantero.material.color.setHex(colorHex);
                }

                document.getElementById(botonId).disabled = true;
                document.getElementById(botonId).innerText = `✅ Montado e Inyectado`;
                document.getElementById('consola-taller').innerHTML += `<br><span style="color:#00ff00">[NUEVO ALERÓN]: Modificado color del elemento de carga.</span>`;
            }
        }
    </script>
</body>
</html>
