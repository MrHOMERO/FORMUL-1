<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>F1 Sensation</title>
</head>
<body>

    <div id="pantalla-1" class="pantalla activa">
        <h1 class="titulo-f1">F1</h1>
        <h2 class="titulo-sensation">SENSATION</h2>
        <div style="margin-top: auto; padding-bottom: 50px; width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="subtitulo-cursiva">Juego de simulador</div>
            <button class="btn-comenzar" onclick="cambiarPantalla('pantalla-1', 'pantalla-2')">COMENZAR JUEGO</button>
        </div>
    </div>

    <div id="pantalla-2" class="pantalla">
        <div class="titulo-pantalla">Elige tu equipo</div>
        <button class="btn-escuderia" onclick="seleccionarEquipo('McLaren')">McLaren</button>
        <button class="btn-escuderia" onclick="seleccionarEquipo('Ferrari')">Ferrari</button>
        <button class="btn-comenzar" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-2', 'pantalla-3')">Siguiente</button>
    </div>

    <div id="pantalla-3" class="pantalla">
        <div class="titulo-pantalla">Gestión de Presupuesto</div>
        <button class="btn-escuderia" onclick="seleccionarPresupuesto(100)">100M - Privado</button>
        <button class="btn-escuderia" onclick="seleccionarPresupuesto(500)">500M - Oficial</button>
        <button class="btn-comenzar" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-3', 'pantalla-taller')">Ir al Taller</button>
    </div>

    <div id="pantalla-taller" class="pantalla">
        <div class="titulo-pantalla">Taller de Ingeniería</div>
        <div id="nombre-equipo-display" style="font-weight:bold; font-size: 24px; margin-bottom: 20px;">EQUIPO</div>
        <div style="padding: 20px;">
            <p>ESTRATEGIA DE NEUMÁTICOS:</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                <button class="btn-escuderia" style="width: auto;" onclick="seleccionarEstrategia('Blando')">Blando</button>
                <button class="btn-escuderia" style="width: auto;" onclick="seleccionarEstrategia('Medio')">Medio</button>
                <button class="btn-escuderia" style="width: auto;" onclick="seleccionarEstrategia('Duro')">Duro</button>
            </div>
        </div>
        <button class="btn-simular" onclick="comenzarSimulacion()">INICIAR CARRERA</button>
    </div>

    <div id="pantalla-simulacion" class="pantalla">
        <div class="cockpit-pantalla">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                <div id="sim-vueltas" style="font-weight: bold;">Vuelta: 1/53</div>
                <div style="text-align: right;"><span style="font-size: 9px; color: #aaa;">POSICIÓN</span><div id="sim-posicion" style="font-size: 18px; font-weight: bold;">P11</div></div>
            </div>
            <div id="auto-telemetria" style="width: 100%; height: 70px; background: rgba(0,0,0,0.5); border-radius: 8px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #444;">
                <div class="rueda" id="rueda-fl" style="width: 18px; height: 18px; border-radius: 50%; background: #00ff66;"></div>
                <div class="rueda" id="rueda-fr" style="width: 18px; height: 18px; border-radius: 50%; background: #00ff66;"></div>
            </div>
            <div id="sim-velocidad" style="font-size: 26px; font-weight: bold; color: #00ff66; margin: 10px 0;">267 km/h</div>
            <div class="panel-grid">
                <div class="telemetria-card"><span>Motor</span><strong id="stat-motor">100%</strong></div>
                <div class="telemetria-card"><span>Gomas</span><strong id="stat-gomas">100%</strong></div>
            </div>
        </div>
        <button class="btn-simular" style="background: #ffcc00; color: #000;" onclick="ejecutarPitStop()">ENTRAR A PITS</button>
        <button class="btn-comenzar" style="background: #333; margin-top: 10px;" onclick="location.reload()">Reiniciar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
