<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation</title>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0f;
            --panel-bg: #14141c;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Arial Black', 'Arial Strip', Impact, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* CONTENEDOR DE LA PORTADA */
        .portada {
            text-align: center;
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(20,20,28,0.2) 0%, rgba(11,11,15,0.95) 90%), 
                        url('https://images.unsplash.com/photo-1560674457-12073ed6c46b?q=80&w=1000') center/cover no-repeat;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 100px rgba(0,0,0,0.8);
            border: 1px solid #222230;
        }

        /* TIPOGRAFÍA LLAMATIVA ESTILO F1 */
        .titulo-juego {
            font-size: 42px;
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        .subtitulo-juego {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            color: var(--f1-red);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: bold;
        }

        /* BOTÓN PRINCIPAL */
        .btn-comenzar {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--f1-red);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 20px rgba(225, 6, 0, 0.5);
            transition: transform 0.1s ease;
        }

        .btn-comenzar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="portada">
        <div class="titulo-juego">F1<br>Sensation</div>
        <div class="subtitulo-juego">Simulación Pro</div>
        
        <button class="btn-comenzar" onclick="siguientePaso()">Comenzar a Jugar</button>
    </div>

    <script>
        function siguientePaso() {
            alert("¡Estructura inicial verificada con éxito! Dime si se ve bien la imagen y la tipografía en tu celular y pasamos al menú de selección de equipos.");
        }
    </script>

</body>
</html>
