<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation</title>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0f;
            --panel-bg: rgba(0, 0, 0, 0.7); 
            --text-light: #ffffff;
        }

        body {
            font-family: 'Arial Black', 'Arial Strip', Impact, sans-serif;
            background-color: var(--dark-bg);
            /* Apunta exactamente a tu archivo fondo.jpg */
            background-image: url('fondo.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* CONTENEDOR DE LA PORTADA CON EFECTO CRISTAL ESMERILADO (DIFUMINADO) */
        .portada {
            text-align: center;
            width: 85%;
            max-width: 380px;
            padding: 45px 25px;
            background-color: var(--panel-bg); 
            
            /* Filtro de desenfoque moderno */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); /* Compatibilidad con móviles */
            
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TIPOGRAFÍA AGRESIVA F1 SENSATION */
        .titulo-juego {
            font-size: 42px;
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.8));
        }

        .subtitulo-juego {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 13px;
            color: var(--f1-red);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 45px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* BOTÓN DE INICIO COMPETITIVO */
        .btn-comenzar {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--f1-red);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 20px rgba(225, 6, 0, 0.6);
            transition: transform 0.1s ease;
        }

        .btn-comenzar:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="portada">
        <div class="titulo-juego">F1<br>Sensation</div>
        <div class="subtitulo-juego">Simulación Pro</div>
        
        <button class="btn-comenzar" onclick="siguientePaso()">Comenzar a Jugar</button>
    </div>

    <script>
        function siguientePaso() {
            alert("¡Paso de inicio completado!");
        }
    </script>

</body>
</html>
