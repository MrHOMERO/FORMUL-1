<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portada">
        <!-- PANTALLA 1: PORTADA -->
        <div id="pantalla-1" class="pantalla activa">
            <div class="titulo-juego">F1 SENSATION</div>
            <div class="subtitulo-juego">Manager Edition</div>
            <button class="btn-comenzar" onclick="cambiarPantalla('pantalla-1', 'pantalla-2')">Comenzar Juego</button>
        </div>

        <!-- PANTALLA 2: SELECCIÓN DE ESCUDERÍA -->
        <div id="pantalla-2" class="pantalla">
            <div class="titulo-pantalla">Elige tu equipo</div>
            <div class="grid-escuderias">
                <button class="btn-escuderia" onclick="seleccionarEquipo('McLaren')">McLaren<span>Woking, UK</span></button>
                <button class="btn-escuderia" onclick="seleccionarEquipo('Ferrari')">Ferrari<span>Maranello, IT</span></button>
            </div>
            <button class="btn-comenzar" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-2', 'pantalla-3')">Siguiente</button>
        </div>

        <!-- PANTALLA 3: PRESUPUESTO -->
        <div id="pantalla-3" class="pantalla">
            <div class="titulo-pantalla">Gestión de Presupuesto</div>
            <p>Selecciona tu capital inicial:</p>
            <button class="btn-escuderia" onclick="seleccionarPresupuesto(100)">100M - Equipo Privado</button>
            <button class="btn-escuderia" onclick="seleccionarPresupuesto(500)">500M - Equipo Oficial</button>
            <button class="btn-comenzar" style="margin-top:20px;" onclick="cambiarPantalla('pantalla-3', 'pantalla-taller')">Ir al Taller</button>
        </div>

        <!-- PANTALLA 4: TALLER -->
        <div id="pantalla-taller" class="pantalla">
            <div class="titulo-pantalla">Taller de Ingeniería</div>
            <div class="contenedor-auto">
                <div class="f1-logo-badge" id="nombre-equipo-display">EQUIPO</div>
            </div>
            <div id="selector-estrategia">
                <p>SELECCIONA TIPO DE GOMA:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Blando')">Blando</button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Medio')">Medio</button>
                    <button class="btn-escuderia" onclick="seleccionarEstrategia('Duro')">Duro</button>
                </div>
            </div>
            <button class="btn-simular" onclick="comenzarSimulacion()">Iniciar Carrera</button>
        </div>

        <!-- PANTALLA 5: SIMULACIÓN -->
        <div id="pantalla-simulacion" class="pantalla">
            <!-- (Tu contenido de Telemetría aquí) -->
            <button class="btn-comenzar" onclick="location.reload()">Reiniciar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
