<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Sensation</title>
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0b0b0f;
            --panel-bg: rgba(0, 0, 0, 0.75); 
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            background-image: url('fondo.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: var(--text-light);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTENEDOR ESTILO CRISTAL */
        .portada {
            text-align: center;
            width: 90%;
            max-width: 420px;
            padding: 30px 20px;
            background-color: var(--panel-bg); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 20px 0;
            box-sizing: border-box;
        }

        /* ELEMENTOS DE PANTALLAS */
        .pantalla { display: none; }
        .activa { display: block; }

        /* TIPOGRAFÍAS */
        .titulo-juego {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 38px;
            line-height: 0.95;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 40%, #aaaaaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitulo-juego {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 12px;
            color: var(--f1-red);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 35px;
            font-weight: bold;
        }

        .titulo-pantalla {
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #ffffff;
            border-bottom: 2px solid var(--f1-red);
            padding-bottom: 8px;
            font-weight: bold;
        }

        /* BOTÓN DE INICIO */
        .btn-comenzar {
            background-color: var(--f1-red);
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 20px rgba(225, 6, 0, 0.6);
        }

        /* GRID EN DOS COLUMNAS PARA ESCUDERÍAS */
        .grid-escuderias {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        /* BOTONES DE LAS ESCUDERÍAS */
        .btn-escuderia {
            background: rgba(25, 25, 35, 0.8);
            border: 1px solid #333344;
            color: white;
            padding: 12px 8px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.1s;
        }

        .btn-escuderia:active { transform: scale(0.96); }

        .btn-escuderia span {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: normal;
            margin-top: 2px;
        }

        /* --- ESTILOS COMPONENTES PASO 3 (PERSONAL Y PILOTOS) --- */
        .seccion-boss {
            background: rgba(225, 6, 0, 0.15);
            border: 1px solid var(--f1-red);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .tarjeta-piloto {
            background: rgba(20, 20, 30, 0.85);
            border: 1px solid #3a3a50;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .tarjeta-piloto:active { transform: scale(0.98); border-color: #00ff66; }

        /* RECUADROS CHICOS PARA LAS IMÁGENES/AVATARES */
        .recuadro-foto {
            width: 50px;
            height: 50px;
            background: #1a1a26;
            border: 2px solid #555577;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        /* SILUETA VECTORIAL DE REEMPLAZO */
        .recuadro-foto::before {
            content: "";
            width: 22px;
            height: 22px;
            background: #8888aa;
            border-radius: 50%;
            position: absolute;
            top: 8px;
        }
        .recuadro-foto::after {
            content: "";
            width: 36px;
            height: 24px;
            background: #8888aa;
            border-radius: 50% 50% 0 0;
            position: absolute;
            bottom: -6px;
        }

        .foto-jefe { border-color: #ffcc00; }
        .foto-jefe::before, .foto-jefe::after { background: #ffcc00; } /* Detalle dorado para el Jefe */
    </style>
</head>
<body>

    <audio id="musica-fondo" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3" type="audio/mpeg">
    </audio>

    <div class="portada">
        
        <div id="pantalla-inicio" class="pantalla activa">
            <div class="titulo-juego">F1<br>Sensation</div>
            <div class="subtitulo-juego">Simulación Pro</div>
            <button class="btn-comenzar" onclick="comenzarJuego()">Comenzar a Jugar</button>
        </div>

        <div id="pantalla-escuderia" class="pantalla">
            <div class="titulo-pantalla">Selecciona Escudería</div>
            <div class="grid-escuderias">
                <button class="btn-escuderia" style="border-left: 5px solid #ff8700;" onclick="seleccionarEscuderia('McLaren')">McLaren<span>Pos. 2025: 1º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #e10600;" onclick="seleccionarEscuderia('Ferrari')">Ferrari<span>Pos. 2025: 2º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #0c1f3c;" onclick="seleccionarEscuderia('Red Bull')">Red Bull<span>Pos. 2025: 3º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #00a19c;" onclick="seleccionarEscuderia('Mercedes')">Mercedes<span>Pos. 2025: 4º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #006f62;" onclick="seleccionarEscuderia('Aston Martin')">Aston Martin<span>Pos. 2025: 5º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #ff85b3;" onclick="seleccionarEscuderia('Alpine')">Alpine<span>Pos. 2025: 6º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #ffffff;" onclick="seleccionarEscuderia('Haas')">Haas<span>Pos. 2025: 7º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #1c34f4;" onclick="seleccionarEscuderia('Racing Bulls')">Racing Bulls<span>Pos. 2025: 8º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #005aff;" onclick="seleccionarEscuderia('Williams')">Williams<span>Pos. 2025: 9º</span></button>
                
                <button class="btn-escuderia" style="border-left: 5px solid #ff0044;" onclick="seleccionarEscuderia('Audi')">Audi<span>Pos. 2025: 10º</span></button>
                <button class="btn-escuderia" style="border-left: 5px solid #cbd5e1;" onclick="seleccionarEscuderia('Cadillac')">Cadillac<span>Nueva Escudería</span></button>
            </div>
        </div>

        <div id="pantalla-personal" class="pantalla">
            <div class="titulo-pantalla" id="titulo-equipo-activa">Estructura</div>
            
            <div class="seccion-boss">
                <div class="recuadro-foto foto-jefe"></div>
                <div>
                    <span style="font-size: 11px; color: #ffcc00; font-weight: bold; display: block; letter-spacing: 1px;">DIRECTOR DE EQUIPO (TÚ)</span>
                    <strong id="nombre-director" style="font-size: 16px;">Cargando...</strong>
                </div>
            </div>

            <p style="font-size: 13px; text-align: left; color: var(--text-muted); margin-bottom: 10px; font-weight: bold;">ASIGNAR INGENIERO A PILOTO:</p>
            
            <div id="lista-pilotos"></div>
        </div>

    </div>

    <script>
        let musica = document.getElementById('musica-fondo');

        // Base de datos oficial de la parrilla
        const DATOS_F1 = {
            "McLaren": { jefe: "Andrea Stella", pilotos: ["Lando Norris", "Oscar Piastri"] },
            "Ferrari": { jefe: "Frédéric Vasseur", pilotos: ["Charles Leclerc", "Lewis Hamilton"] },
            "Red Bull": { jefe: "Christian Horner", pilots: ["Max Verstappen", "Sergio Pérez"] },
            "Mercedes": { jefe: "Toto Wolff", pilotos: ["George Russell", "Kimi Antonelli"] },
            "Aston Martin": { jefe: "Mike Krack", pilotos: ["Fernando Alonso", "Lance Stroll"] },
            "Alpine": { jefe: "Oliver Oakes", pilotos: ["Pierre Gasly", "Jack Doohan"] },
            "Haas": { jefe: "Ayao Komatsu", pilotos: ["Esteban Ocon", "Oliver Bearman"] },
            "Racing Bulls": { jefe: "Laurent Mekies", pilotos: ["Yuki Tsunoda", "Liam Lawson"] },
            "Williams": { jefe: "James Vowles", pilotos: ["Alexander Albon", "Carlos Sainz"] },
            "Audi": { jefe: "Mattia Binotto", pilotos: ["Nico Hülkenberg", "Gabriel Bortoleto"] },
            "Cadillac": { jefe: "Mario Andretti", pilotos: ["Piloto 1 Defecto", "Piloto 2 Defecto"] }
        };

        // Arreglo rápido por si escribí mal la clave de Red Bull arriba
        DATOS_F1["Red Bull"].pilotos = ["Max Verstappen", "Sergio Pérez"];

        function comenzarJuego() {
            musica.volume = 0.5; 
            musica.play().catch(error => console.log("Audio bloqueado:", error));
            cambiarPantalla('pantalla-inicio', 'pantalla-escuderia');
        }

        function cambiarPantalla(ocultar, mostrar) {
            document.getElementById(ocultar).style.display = 'none';
            document.getElementById(mostrar).style.display = 'block';
        }

        function seleccionarEscuderia(equipo) {
            const info = DATOS_F1[equipo];
            
            // Colocar título y Jefe de Equipo
            document.getElementById('titulo-equipo-activa').innerText = equipo.toUpperCase();
            document.getElementById('nombre-director').innerText = info.jefe;

            // Renderizar los dos pilotos de forma dinámica
            const contenedorPilotos = document.getElementById('lista-pilotos');
            contenedorPilotos.innerHTML = "";

            info.pilotos.forEach(piloto => {
                contenedorPilotos.innerHTML += `
                    <div class="tarjeta-piloto" onclick="seleccionarPiloto('${piloto}')">
                        <div class="recuadro-foto"></div>
                        <div>
                            <strong style="font-size: 15px; color: white; display: block;">${piloto}</strong>
                            <span style="font-size: 11px; color: #00ff66;">Asignar telemetría de carrera</span>
                        </div>
                    </div>
                `;
            });

            cambiarPantalla('pantalla-escuderia', 'pantalla-personal');
        }

        function seleccionarPiloto(nombrePiloto) {
            alert("Piloto asignado: " + nombrePiloto + "\n\n¡Estructura de jerarquía validada correctamente! Dime si se ven los recuadros de fotos ordenados y avanzamos al Taller de Ingeniería 3D.");
        }
    </script>

</body>
</html>
